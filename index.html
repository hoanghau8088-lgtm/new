<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bảng điều khiển Năng suất — Pick / Pack</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --bg:#0c0e12;
    --panel:#14171d;
    --panel-2:#191d24;
    --line:#262b34;
    --text:#e7eaef;
    --muted:#838d9c;
    --dim:#565f6e;
    --pick:#4f9eff;
    --pack:#ff8a3d;
    --red:#e5484d;
    --green:#2fbf71;
    --mono:'JetBrains Mono','DejaVu Sans Mono',monospace;
    --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    --display:'Oswald',var(--sans);
  }
  html[data-theme="light"]{
    --bg:#f4f5f7;
    --panel:#ffffff;
    --panel-2:#f0f2f5;
    --line:#e3e6eb;
    --text:#161a20;
    --muted:#5c6572;
    --dim:#939aa6;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:var(--sans);
    min-height:100vh;
    padding:20px 24px;
    transition:background .2s ease,color .2s ease;
  }
  .wrap{max-width:1320px;margin:0 auto;}
  .topbar{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;flex-wrap:wrap;margin-bottom:18px;padding-bottom:16px;border-bottom:1px solid var(--line);}
  h1{margin:0;font-family:var(--display);font-size:29px;font-weight:600;text-transform:uppercase;}
  .clock{font-family:var(--mono);font-size:13px;color:var(--muted);text-align:right;}
  .clock b{color:var(--text);font-size:15px;}
  .pulse-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);margin-right:6px;animation:pulse 2s infinite;}
  @keyframes pulse{0%{opacity:1;}70%{opacity:0;}100%{opacity:0;}}
  .head-actions{display:flex;gap:14px;align-items:center;justify-content:flex-end;margin-top:6px;flex-wrap:wrap;}
  .theme-toggle{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--dim);cursor:pointer;background:var(--panel-2);border:1px solid var(--line);border-radius:20px;padding:4px 10px;}
  .theme-toggle:hover{border-color:var(--muted);}
  .config-toggle{font-size:11px;color:var(--dim);cursor:pointer;text-decoration:underline;}
  .feeds{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px;}
  .feed{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:14px;cursor:pointer;}
  .feed:hover{border-color:var(--muted);}
  .feed::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--pick);}
  .feed.pack::before{background:var(--pack);}
  .feed-icon{width:38px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-weight:700;font-size:13px;background:rgba(79,158,255,.12);color:var(--pick);flex-shrink:0;}
  .feed.pack .feed-icon{background:rgba(255,138,61,.12);color:var(--pack);}
  .feed-body{flex:1;}
  .feed-title{font-size:13px;font-weight:600;color:var(--text);}
  .feed-sub{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:2px;}
  .feed input{display:none;}
  .feed-btn{font-family:var(--sans);font-size:12px;font-weight:600;color:var(--text);background:var(--panel-2);border:1px solid var(--line);border-radius:7px;padding:8px 12px;cursor:pointer;}
  .feed-btn:hover{border-color:var(--muted);}
  .kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:22px;}
  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px 16px;}
  .kpi-label{font-size:10.5px;text-transform:uppercase;color:var(--dim);font-weight:600;}
  .kpi-val{font-family:var(--mono);font-size:26px;font-weight:700;margin-top:6px;}
  .kpi-val.g{color:var(--green);}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px;margin-bottom:16px;}
  .panel-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
  .panel-title{font-family:var(--display);font-size:14px;font-weight:600;text-transform:uppercase;}
  .rtable{width:100%;border-collapse:collapse;font-size:13px;}
  .rtable th{text-align:left;font-size:11px;text-transform:uppercase;color:var(--dim);font-weight:600;padding:7px 4px;border-bottom:1px solid var(--line);}
  .rtable td{padding:9px 4px;border-bottom:1px solid var(--line);color:var(--text);}
  .rtable td.num{text-align:right;font-family:var(--mono);}
  .table-scroll{max-height:420px;overflow-y:auto;border-radius:8px;}
  .dl-btn{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10.5px;font-weight:600;color:var(--muted);background:var(--panel-2);border:1px solid var(--line);border-radius:7px;padding:6px 10px;cursor:pointer;}
  .dl-btn:hover{color:var(--text);border-color:var(--muted);}
  .dl-btn-main{font-family:var(--mono);font-size:11.5px;font-weight:700;color:var(--bg);background:var(--green);border:1px solid var(--green);border-radius:8px;padding:9px 16px;cursor:pointer;}
  .dl-btn-main:hover{filter:brightness(1.08);}
  .config-panel{display:none;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:16px;margin-bottom:20px;}
  .config-panel.open{display:block;}
  .config-row{display:flex;gap:10px;align-items:center;margin-bottom:10px;flex-wrap:wrap;}
  .config-row label{font-size:12px;color:var(--muted);flex-shrink:0;}
  .config-row input.small{max-width:110px;background:var(--panel-2);border:1px solid var(--line);color:var(--text);border-radius:7px;padding:8px 10px;font-size:12px;}
  .footer-note{margin-top:26px;font-size:11px;color:var(--dim);text-align:center;}
  @media(max-width:900px){.kpis{grid-template-columns:repeat(2,1fr);}.feeds{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div>
      <h1>📊 Pick / Pack Dashboard</h1>
    </div>
    <div class="clock">
      <div><span class="pulse-dot"></span><b id="clockTime">--:--:--</b></div>
      <div id="clockDate">—</div>
      <div class="head-actions">
        <button class="dl-btn-main" id="exportAllBtn">📥 Xuất Excel</button>
        <span class="theme-toggle" id="themeToggle">🌙 Dark</span>
        <span class="config-toggle" id="configToggle">⚙ Cấu hình</span>
      </div>
    </div>
  </div>

  <div class="config-panel" id="configPanel">
    <div class="config-row">
      <label>Picking Ngưỡng Green:</label>
      <input type="number" id="pickGreen" class="small" value="200">
    </div>
    <div class="config-row">
      <label>Packing Ngưỡng Green:</label>
      <input type="number" id="packGreen" class="small" value="25">
    </div>
  </div>

  <div class="feeds">
    <label class="feed pick" id="dropPick">
      <div class="feed-icon">PK</div>
      <div class="feed-body">
        <div class="feed-title">Picking</div>
        <div class="feed-sub" id="pickFileName">Chưa có file</div>
      </div>
      <span class="feed-btn">Chọn file</span>
      <input type="file" id="pickInput" accept=".xlsx,.xls,.csv" multiple>
    </label>
    <label class="feed pack" id="dropPack">
      <div class="feed-icon">PA</div>
      <div class="feed-body">
        <div class="feed-title">Packing</div>
        <div class="feed-sub" id="packFileName">Chưa có file</div>
      </div>
      <span class="feed-btn">Chọn file</span>
      <input type="file" id="packInput" accept=".xlsx,.xls,.csv" multiple>
    </label>
  </div>

  <div class="kpis" id="kpiRow">
    <div class="kpi"><div class="kpi-label">Tổng nhân sự</div><div class="kpi-val" id="kpiTotal">—</div></div>
    <div class="kpi"><div class="kpi-label">Pick Green</div><div class="kpi-val g" id="kpiPickGreen">—</div></div>
    <div class="kpi"><div class="kpi-label">Pack Green</div><div class="kpi-val g" id="kpiPackGreen">—</div></div>
    <div class="kpi"><div class="kpi-label">Tổng Output</div><div class="kpi-val" id="kpiTotalOutput">—</div></div>
    <div class="kpi"><div class="kpi-label">Files</div><div class="kpi-val" id="kpiTotalFiles">—</div></div>
  </div>

  <div class="panel">
    <div class="panel-head">
      <div class="panel-title">📋 Picking</div>
      <button class="dl-btn" onclick="downloadTable('tblPick')">📥 Download</button>
    </div>
    <div class="table-scroll">
      <table class="rtable" id="tblPick">
        <thead>
          <tr><th>Email</th><th>Name</th><th class="num">Output</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <div class="panel">
    <div class="panel-head">
      <div class="panel-title">📋 Packing</div>
      <button class="dl-btn" onclick="downloadTable('tblPack')">📥 Download</button>
    </div>
    <div class="table-scroll">
      <table class="rtable" id="tblPack">
        <thead>
          <tr><th>Email</th><th>Name</th><th class="num">Output</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <div class="footer-note">Dashboard v1.0 • Data processed locally in browser</div>
</div>

<script>
let pickData = [], packData = [];

function tick(){
  const d = new Date();
  document.getElementById('clockTime').textContent = d.toLocaleTimeString('vi-VN', {hour12:false});
  document.getElementById('clockDate').textContent = d.toLocaleDateString('vi-VN', {weekday:'long', year:'numeric', month:'2-digit', day:'2-digit'});
}
tick();
setInterval(tick, 1000);

function initTheme(){
  const theme = localStorage.getItem('theme') || 'dark';
  document.documentElement.setAttribute('data-theme', theme);
}
function toggleTheme(){
  const current = document.documentElement.getAttribute('data-theme') || 'dark';
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  document.getElementById('themeToggle').textContent = next === 'dark' ? '🌙 Dark' : '☀️ Light';
}
document.getElementById('themeToggle').addEventListener('click', toggleTheme);
initTheme();

document.getElementById('configToggle').addEventListener('click', () => {
  document.getElementById('configPanel').classList.toggle('open');
});

function handleFiles(files, task){
  const fileArray = Array.from(files);
  if (fileArray.length === 0) return;
  const names = fileArray.map(f => f.name).join(', ');
  document.getElementById(task + 'FileName').textContent = names;
  fileArray.forEach(file => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, {type: 'array'});
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(sheet, {header: 1});
        parseFile(rows, task);
      } catch (err){
        alert('Error: ' + err.message);
      }
    };
    reader.readAsArrayBuffer(file);
  });
}

function parseFile(rows, task){
  const employees = [];
  if (rows.length < 2) return;
  const headers = rows[0].map(h => String(h || '').toLowerCase().trim());
  const emailIdx = headers.findIndex(h => h.includes('email'));
  const nameIdx = headers.findIndex(h => h.includes('name'));
  const effIdx = headers.findIndex(h => h.includes('efficiency') || h.includes('output') || h.includes('throughput'));
  if (emailIdx === -1) return;
  for (let i = 1; i < rows.length; i++){
    const row = rows[i] || [];
    if (!row[emailIdx]) continue;
    employees.push({
      email: String(row[emailIdx] || '').toLowerCase(),
      name: nameIdx !== -1 ? String(row[nameIdx] || '') : 'N/A',
      efficiency: effIdx !== -1 ? Number(row[effIdx]) || 0 : 0
    });
  }
  if (task === 'pick') pickData = employees;
  else packData = employees;
  renderTables();
  updateKPIs();
}

function renderTables(){
  const pickBody = document.querySelector('#tblPick tbody');
  const packBody = document.querySelector('#tblPack tbody');
  pickBody.innerHTML = '';
  packBody.innerHTML = '';
  pickData.forEach(e => {
    pickBody.innerHTML += `<tr><td>${e.email}</td><td>${e.name}</td><td class="num">${e.efficiency}</td></tr>`;
  });
  packData.forEach(e => {
    packBody.innerHTML += `<tr><td>${e.email}</td><td>${e.name}</td><td class="num">${e.efficiency}</td></tr>`;
  });
}

function updateKPIs(){
  const allEmails = new Set([...pickData.map(e => e.email), ...packData.map(e => e.email)]);
  const pickGreen = Number(document.getElementById('pickGreen').value) || 200;
  const packGreen = Number(document.getElementById('packGreen').value) || 25;
  const pickCount = pickData.filter(e => e.efficiency >= pickGreen).length;
  const packCount = packData.filter(e => e.efficiency >= packGreen).length;
  const total = pickData.reduce((a, e) => a + e.efficiency, 0) + packData.reduce((a, e) => a + e.efficiency, 0);
  document.getElementById('kpiTotal').textContent = allEmails.size;
  document.getElementById('kpiPickGreen').textContent = pickCount;
  document.getElementById('kpiPackGreen').textContent = packCount;
  document.getElementById('kpiTotalOutput').textContent = total;
  document.getElementById('kpiTotalFiles').textContent = pickData.length + packData.length;
}

function downloadTable(id){
  const table = document.getElementById(id);
  const rows = [];
  table.querySelectorAll('tr').forEach(tr => {
    const row = [];
    tr.querySelectorAll('th, td').forEach(td => row.push(td.textContent.trim()));
    rows.push(row);
  });
  const ws = XLSX.utils.aoa_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, id);
  XLSX.writeFile(wb, id + '.xlsx');
}

document.getElementById('exportAllBtn').addEventListener('click', () => {
  const wb = XLSX.utils.book_new();
  const pickRows = [['Email', 'Name', 'Output'], ...pickData.map(e => [e.email, e.name, e.efficiency])];
  const packRows = [['Email', 'Name', 'Output'], ...packData.map(e => [e.email, e.name, e.efficiency])];
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(pickRows), 'Picking');
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(packRows), 'Packing');
  XLSX.writeFile(wb, 'report_' + new Date().toISOString().slice(0, 10) + '.xlsx');
});

document.getElementById('pickInput').addEventListener('change', (e) => handleFiles(e.target.files, 'pick'));
document.getElementById('packInput').addEventListener('change', (e) => handleFiles(e.target.files, 'pack'));

['dropPick', 'dropPack'].forEach(id => {
  const el = document.getElementById(id);
  el.addEventListener('dragover', (e) => {e.preventDefault(); el.style.opacity = '0.8';});
  el.addEventListener('dragleave', () => {el.style.opacity = '1';});
  el.addEventListener('drop', (e) => {
    e.preventDefault();
    el.style.opacity = '1';
    const task = id === 'dropPick' ? 'pick' : 'pack';
    handleFiles(e.dataTransfer.files, task);
  });
});
</script>
</body>
</html>
